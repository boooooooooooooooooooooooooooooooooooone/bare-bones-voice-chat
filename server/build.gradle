plugins {
    id 'java'
}

version = 'alpha-8'
group = 'xyz.pobob.barebonesvc'

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':common')
}

jar {
    manifest {
        attributes(
                'Main-Class': 'xyz.pobob.barebonesvc.BareBonesVC'
        )
    }
    archiveBaseName.set('barebonesvc-server')
    from(project(":common").sourceSets.main.output)
}